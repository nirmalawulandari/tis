<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🩷</title>
    <style>
        /* Menggunakan font sistem modern dipadu dengan warna background pink sangat muda (Blush) */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #fdf2f8; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            /* Shadow dengan sentuhan warna pink transparan */
            box-shadow: 0 8px 30px rgba(219, 39, 119, 0.08); 
            max-width: 90%;
            width: 380px;
            border: 1px solid #fce7f3;
            z-index: 10;
        }

        .gif {
            width: 140px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
            color: #9d174d; /* Pink pekat / Burgundy modern */
        }

        p {
            font-size: 15px;
            color: #be185d; /* Pink medium untuk subtitle */
            margin: 0 0 32px 0;
            line-height: 1.5;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            position: relative;
            min-height: 45px;
        }

        button {
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
        }

        /* Desain Tombol Yes - Solid Pink Elegant */
        #btn-yes {
            background-color: #db2777;
            color: #ffffff;
            border: 1px solid #db2777;
            z-index: 11;
            transition: all 0.2s ease;
        }

        #btn-yes:hover {
            background-color: #be185d;
            border-color: #be185d;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(219, 39, 119, 0.25);
        }

        /* Desain Tombol No - Light Pink Outline */
        #btn-no {
            background-color: #ffffff;
            color: #db2777;
            border: 1px solid #fbcfe8;
            z-index: 10;
            /* Efek meluncur/bergeser yang sangat mulus */
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <!-- Gambar GIF estetis -->
        <img src="https://media.tenor.com/GfHKEqkGq4wAAAAi/tkthao219-bubududu.gif" alt="Cute" class="gif" id="gif-image">
        
        <h1 id="title">Halo Iqbal, mau nggak jadi pacarku?</h1>
        <p id="subtitle">Pilih jawabanmu di bawah ini.</p>
        
        <div class="btn-container" id="btn-container">
            <button id="btn-yes" onclick="terima()">Mau 🩷</button>
            <button id="btn-no" onmouseover="kabur()" ontouchstart="kabur()">Nggak</button>
        </div>
    </div>

    <script>
        // --- LOGIKA TOMBOL BERGESER (SMOOTH) ---
        const btnNo = document.getElementById('btn-no');
        let currentX = 0;
        let currentY = 0;

        function kabur() {
            let geserX = (Math.random() * 80 + 50); 
            let geserY = (Math.random() * 80 + 50); 

            currentX += (Math.random() > 0.5 ? geserX : -geserX);
            currentY += (Math.random() > 0.5 ? geserY : -geserY);

            if (currentX > 120 || currentX < -120) currentX = 0;
            if (currentY > 120 || currentY < -120) currentY = 0;

            btnNo.style.transform = `translate(${currentX}px, ${currentY}px)`;
        }

        // --- LOGIKA SAAT DITERIMA ---
        function terima() {
            document.getElementById('title').innerText = "Yes, finally. 🩷";
            document.getElementById('subtitle').innerText = "I love you, Iqbal.";
            
            document.getElementById('gif-image').src = "https://media.tenor.com/J_8JbHIE-1UAAAAi/tkthao219-bubududu.gif";
            
            document.getElementById('btn-container').style.display = 'none';
        }
    </script>
</body>
</html>
